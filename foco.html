<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foco</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --border: #2a2a2a;
  --accent: #D0122C;
  --accent2: #ff4d4d;
  --text: #f0ece4;
  --muted: #555;
  --done: #2d6a4f;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TELA INICIAL */
#screen-start {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 2rem;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(64px, 15vw, 120px);
  letter-spacing: 0.05em;
  line-height: 1;
  color: var(--text);
  position: relative;
}

.logo span {
  color: var(--accent);
}

.logo::after {
  content: '';
  display: block;
  height: 3px;
  background: var(--accent);
  margin-top: 8px;
  animation: expandLine 0.6s ease forwards;
}

@keyframes expandLine {
  from { width: 0; }
  to { width: 100%; }
}

.start-sub {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  text-align: center;
}

.start-form {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.start-form input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}

.start-form input::placeholder { color: var(--muted); }
.start-form input:focus { border-color: var(--accent); }

.start-form textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text);
  outline: none;
  resize: none;
  height: 100px;
  transition: border-color 0.15s;
  line-height: 1.6;
}

.start-form textarea::placeholder { color: var(--muted); }
.start-form textarea:focus { border-color: var(--accent); }

.field-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.field-wrap { display: flex; flex-direction: column; }

.btn-start {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 16px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  margin-top: 4px;
}

.btn-start:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-start:active { transform: scale(0.98); }

/* TELA FOCO */
#screen-focus {
  display: none;
  flex: 1;
  flex-direction: column;
}

#screen-focus.active { display: flex; }

/* HEADER */
.focus-header {
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.task-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.05em;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.progress-bar {
  width: 120px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.progress-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  min-width: 40px;
  text-align: right;
}

/* ÁREA PRINCIPAL */
.focus-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 2rem;
  text-align: center;
}

.step-number {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.step-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(32px, 7vw, 60px);
  letter-spacing: 0.04em;
  line-height: 1.1;
  color: var(--text);
  max-width: 640px;
  animation: fadeUp 0.3s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-hint {
  font-size: 13px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  max-width: 400px;
  line-height: 1.6;
}

/* TIMER */
.timer-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.timer-display {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  letter-spacing: 0.08em;
  color: var(--accent);
  line-height: 1;
  min-width: 150px;
  text-align: center;
}

.timer-display.warning { color: #ff8c00; }
.timer-display.urgent { color: var(--accent); animation: blink 0.8s ease infinite; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.timer-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

/* BOTÕES DE AÇÃO */
.action-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn-done {
  background: var(--done);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 14px 32px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-done:hover { filter: brightness(1.2); transform: translateY(-1px); }

.btn-skip {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 24px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-skip:hover { border-color: var(--muted); color: var(--text); }

/* PAINEL LATERAL DE PASSOS */
.steps-sidebar {
  border-top: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  flex-wrap: wrap;
}

.step-pill {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--muted);
  white-space: nowrap;
  transition: all 0.2s;
}

.step-pill.current {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(208, 18, 44, 0.08);
}

.step-pill.done {
  border-color: var(--done);
  color: var(--done);
  background: rgba(45, 106, 79, 0.1);
  text-decoration: line-through;
}

/* TELA CONCLUSÃO */
#screen-done {
  display: none;
  flex: 1;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
  gap: 1.5rem;
}

#screen-done.active { display: flex; }

.done-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 12vw, 96px);
  letter-spacing: 0.05em;
  line-height: 1;
  color: var(--text);
}

.done-title span { color: var(--accent); }

.done-sub {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.btn-restart {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 28px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 1rem;
}

.btn-restart:hover { border-color: var(--accent); color: var(--accent); }

/* LOADING */
.loading-wrap {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.loading-wrap.active { display: flex; }

.loading-dots {
  display: flex;
  gap: 6px;
}

.dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%,80%,100% { opacity:.2; transform:scale(.8); }
  40% { opacity:1; transform:scale(1); }
}

.loading-text {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
</style>
</head>
<body>

<!-- TELA INICIAL -->
<div id="screen-start">
  <div>
    <div class="logo">FO<span>C</span>O</div>
    <p class="start-sub">uma coisa de cada vez</p>
  </div>

  <div class="start-form">
    <div class="field-wrap">
      <span class="field-label">O que você precisa fazer agora?</span>
      <input type="text" id="input-task" placeholder="ex: escrever o briefing da pauta sneaker" maxlength="80">
    </div>

    <div class="field-wrap">
      <span class="field-label">Detalhes (opcional — joga tudo aqui)</span>
      <textarea id="input-context" placeholder="qualquer coisa que você sabe sobre essa tarefa, mesmo fragmentado..."></textarea>
    </div>

    <button class="btn-start" onclick="iniciar()">ENTRAR EM FOCO</button>
  </div>
</div>

<!-- TELA FOCO -->
<div id="screen-focus">
  <div class="focus-header">
    <div class="task-title" id="header-task">—</div>
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progress-label">0/0</span>
    </div>
  </div>

  <div class="focus-main">
    <div class="loading-wrap active" id="loading">
      <div class="loading-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <span class="loading-text">quebrando em passos...</span>
    </div>

    <div id="step-content" style="display:none; flex-direction:column; align-items:center; gap:1.5rem; width:100%;">
      <span class="step-number" id="step-number">passo 1</span>
      <div class="step-text" id="step-text">—</div>
      <div class="step-hint" id="step-hint"></div>

      <div class="timer-wrap">
        <div class="timer-display" id="timer-display">--:--</div>
        <span class="timer-label">tempo estimado</span>
      </div>

      <div class="action-row">
        <button class="btn-done" onclick="proximoPasso()">✓ FEZ</button>
        <button class="btn-skip" onclick="proximoPasso(true)">pular →</button>
      </div>
    </div>
  </div>

  <div class="steps-sidebar" id="steps-sidebar"></div>
</div>

<!-- TELA CONCLUSÃO -->
<div id="screen-done">
  <div class="done-title">FEI<span>T</span>O.</div>
  <p class="done-sub">você fez. isso conta.</p>
  <button class="btn-restart" onclick="reiniciar()">nova tarefa →</button>
</div>

<script>
let steps = [];
let currentStep = 0;
let timerInterval = null;
let timerSeconds = 0;

async function iniciar() {
  const task = document.getElementById('input-task').value.trim();
  const context = document.getElementById('input-context').value.trim();

  if (!task) {
    document.getElementById('input-task').focus();
    return;
  }

  document.getElementById('screen-start').style.display = 'none';
  document.getElementById('screen-focus').classList.add('active');
  document.getElementById('header-task').textContent = task;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Você ajuda pessoas com TDAH a executar tarefas. Sua função é quebrar qualquer tarefa em passos MUITO pequenos, concretos e imediatos — cada passo deve levar no máximo 10 minutos e ser inequívoco (sem ambiguidade sobre o que fazer).

REGRAS:
- Máximo 6 passos
- Cada passo começa com um verbo de ação (Abrir, Escrever, Copiar, Escolher, etc.)
- Nada de passos vagos como "pesquisar sobre o assunto" — seja específico
- O primeiro passo deve ser ridiculamente fácil para quebrar a inércia
- Inclua uma dica curta de motivação ou estratégia para TDAH quando relevante

Retorne APENAS JSON válido, sem markdown:
{
  "steps": [
    {
      "action": "texto curto do passo (máx 8 palavras, imperativo)",
      "hint": "dica opcional de 1 linha ou string vazia",
      "minutes": número de minutos estimados (1-10)
    }
  ]
}`,
        messages: [{
          role: 'user',
          content: `Tarefa: ${task}${context ? '\nContexto: ' + context : ''}\n\nQuebra em passos para TDAH.`
        }]
      })
    });

    const data = await res.json();
    const raw = data.content?.map(b => b.text || '').join('') || '{}';
    const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    steps = parsed.steps || [];

  } catch (e) {
    // fallback se API falhar
    steps = [
      { action: 'Abrir o documento ou arquivo necessário', hint: 'só abrir. não precisa fazer nada ainda.', minutes: 1 },
      { action: 'Ler ou relembrar o objetivo', hint: '', minutes: 2 },
      { action: 'Fazer a primeira parte, só ela', hint: 'ignore o resto por enquanto', minutes: 10 },
      { action: 'Revisar o que fez até agora', hint: '', minutes: 5 },
      { action: 'Finalizar e salvar', hint: 'feito é melhor que perfeito', minutes: 5 }
    ];
  }

  document.getElementById('loading').classList.remove('active');
  renderSidebar();
  mostrarPasso(0);
}

function renderSidebar() {
  const sidebar = document.getElementById('steps-sidebar');
  sidebar.innerHTML = steps.map((s, i) =>
    `<span class="step-pill" id="pill-${i}">${i + 1}. ${s.action}</span>`
  ).join('');
}

function mostrarPasso(index) {
  if (index >= steps.length) {
    concluir();
    return;
  }

  currentStep = index;
  const step = steps[index];

  document.getElementById('step-content').style.display = 'flex';
  document.getElementById('step-number').textContent = `passo ${index + 1} de ${steps.length}`;

  const stepTextEl = document.getElementById('step-text');
  stepTextEl.style.animation = 'none';
  stepTextEl.offsetHeight;
  stepTextEl.style.animation = '';
  stepTextEl.textContent = step.action;

  document.getElementById('step-hint').textContent = step.hint || '';

  // atualizar pills
  document.querySelectorAll('.step-pill').forEach((p, i) => {
    p.className = 'step-pill' + (i < index ? ' done' : i === index ? ' current' : '');
  });

  // progresso
  const pct = Math.round((index / steps.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${index}/${steps.length}`;

  // timer
  iniciarTimer(step.minutes || 5);
}

function iniciarTimer(minutes) {
  if (timerInterval) clearInterval(timerInterval);
  timerSeconds = minutes * 60;
  atualizarTimer();

  timerInterval = setInterval(() => {
    timerSeconds--;
    atualizarTimer();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
    }
  }, 1000);
}

function atualizarTimer() {
  const m = Math.floor(Math.abs(timerSeconds) / 60);
  const s = Math.abs(timerSeconds) % 60;
  const display = document.getElementById('timer-display');
  const prefix = timerSeconds < 0 ? '+' : '';
  display.textContent = `${prefix}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  display.className = 'timer-display';
  if (timerSeconds <= 60 && timerSeconds > 0) display.classList.add('warning');
  if (timerSeconds <= 0) display.classList.add('urgent');
}

function proximoPasso(skip = false) {
  if (timerInterval) clearInterval(timerInterval);

  const pill = document.getElementById(`pill-${currentStep}`);
  if (pill) pill.className = 'step-pill done';

  document.getElementById('progress-fill').style.width =
    Math.round(((currentStep + 1) / steps.length) * 100) + '%';
  document.getElementById('progress-label').textContent =
    `${currentStep + 1}/${steps.length}`;

  mostrarPasso(currentStep + 1);
}

function concluir() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('screen-focus').classList.remove('active');
  document.getElementById('screen-done').classList.add('active');
}

function reiniciar() {
  steps = [];
  currentStep = 0;
  if (timerInterval) clearInterval(timerInterval);

  document.getElementById('screen-done').classList.remove('active');
  document.getElementById('screen-focus').classList.remove('active');
  document.getElementById('screen-start').style.display = '';

  document.getElementById('input-task').value = '';
  document.getElementById('input-context').value = '';
  document.getElementById('loading').classList.add('active');
  document.getElementById('step-content').style.display = 'none';
}

// enter para iniciar
document.getElementById('input-task').addEventListener('keydown', e => {
  if (e.key === 'Enter') iniciar();
});
</script>
</body>
</html>
